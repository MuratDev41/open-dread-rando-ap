name: Build Windows Patcher

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller zstd "mercury-engine-data-structures" construct jsonschema ips.py open-dread-rando-exlaunch json-delta
        
    - name: Build with PyInstaller
      run: |
        python build_patcher.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MetroidDreadPatcher-Windows
        path: dist/MetroidDreadPatcher.exe
